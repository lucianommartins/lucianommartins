name: Metrics

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: lucianommartins/my-metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: lucianommartins
          template: classic
          base: header, activity, community

          repositories_skipped: |
            lucianommartins/my-vllm
            lucianommartins/my-transformers
            lucianommartins/my-litellm
            lucianommartins/my-pydantic-ai
            lucianommartins/jax-ai-stack

          plugin_isocalendar: yes
          plugin_lines: yes
          plugin_languages: yes
          plugin_languages_skipped: |
            lucianommartins/my-vllm
            lucianommartins/my-transformers
            lucianommartins/my-litellm
            lucianommartins/my-pydantic-ai
            lucianommartins/jax-ai-stack
          plugin_languages_limit: 8
          plugin_people: yes
          plugin_people_types: followers

          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_facts: yes
          plugin_habits_days: 30
          plugin_habits_from: 500
          plugin_habits_skipped: |
            lucianommartins/my-vllm
            lucianommartins/my-transformers
            lucianommartins/my-litellm
            lucianommartins/my-pydantic-ai
            lucianommartins/jax-ai-stack
            huggingface/transformers
            google-deepmind/hf-transformers
            google-gemma/transformers-private
            google-gemma/vllm-private

          config_timezone: America/Sao_Paulo
